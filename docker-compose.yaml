version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: transactionsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./0db-init:/docker-entrypoint-initdb.d  # any .sql in /docker-entrypoint-initdb.d/ runs automatically...

  payment-service:
    build: ./payment-service
    ports:
      - "8080:8080"
    depends_on:
      - kafka

  fraud-service:
    build: ./fraud-service
    depends_on:
      - kafka
      - postgres

  transaction-service:
    build: ./transaction-service
    ports:
      - "8083:8080"
    depends_on:
      - kafka
      - postgres

  notification-service:
    build: ./notification-service
    depends_on:
      - kafka


# mvn clean package
# docker compose up --build

  # run demo script(s)
    # python3 demo-script.py
    # python3 demo-query-transactions.py
    # or,
    # ./demo-script.sh
    # ./demo-query-transactions.sh

  # docker compose logs
  # or, docker compose logs -f fraud-service (send requests then watch logs live...)

  # run sql query script
    # psql -U postgres -d transactionsd -f ./demo-db-query.sql

